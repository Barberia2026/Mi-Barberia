<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenidos — Barbería Estilo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="barber-bg page-fade">
  <a href="admin.html" class="corner-admin">Admin</a>

  <div class="landing">
    <div class="landing-card">
      <div class="barber-pole" aria-hidden="true"></div>

      <span class="badge">Bienvenidos</span>
      <h1 id="bizName">Barbería Estilo</h1>
      <p class="sub" id="bizTagline">Corte, barba y estilo</p>
      <p class="hero-phrase" id="bizHeroPhrase">Cortes modernos, barba y estilo profesional</p>

      <div class="icon-strip">
        <div class="icon-chip">
          <span class="icon-circle">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="12" r="5"/><circle cx="14" cy="36" r="5"/><path d="M18 15 L40 41"/><path d="M18 33 L40 7"/></svg>
          </span>
          <span class="icon-label">Corte</span>
        </div>
        <div class="icon-chip">
          <span class="icon-circle">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="14" y="6" width="20" height="26" rx="4"/><path d="M18 32 L18 40 M22 32 L22 42 M26 32 L26 42 M30 32 L30 40"/><rect x="20" y="2" width="8" height="5" rx="1.5"/></svg>
          </span>
          <span class="icon-label">Máquina</span>
        </div>
        <div class="icon-chip">
          <span class="icon-circle">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><g transform="rotate(45 24 24)"><rect x="8" y="20" width="22" height="8" rx="4"/><rect x="30" y="19" width="10" height="10" rx="4" fill="currentColor" stroke="none"/></g></svg>
          </span>
          <span class="icon-label">Navaja</span>
        </div>
        <div class="icon-chip">
          <span class="icon-circle">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M24 6 C14 6 9 14 9 23 C9 33 16 43 24 43 C32 43 39 33 39 23 C39 14 34 6 24 6 Z"/><path d="M14 19 Q24 24 34 19"/></svg>
          </span>
          <span class="icon-label">Barba</span>
        </div>
        <div class="icon-chip">
          <span class="icon-circle">
            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="6" width="6" height="22" rx="3"/><rect x="10" y="26" width="26" height="6" rx="3"/><rect x="30" y="20" width="6" height="4" rx="2"/><rect x="10" y="32" width="4" height="10" rx="2"/><rect x="4" y="40" width="16" height="4" rx="2"/></svg>
          </span>
          <span class="icon-label">Sillón</span>
        </div>
      </div>

      <div class="divider" aria-hidden="true">✂️</div>

      <a href="index.html" class="btn btn-primary" id="btnGoToIndex">📅 Pedir cita</a>
    </div>
  </div>

  <!-- Pantalla de transición: se muestra al pedir cita, antes de pasar a la agenda -->
  <div class="cut-transition" id="cutTransition" aria-hidden="true">
    <div class="cut-transition-img">
      <img src="img/transicion-corte.jpg" alt="Barbero cortando el cabello de un cliente" />
    </div>
    <p class="cut-transition-text">Preparando tu cita…</p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/whatsapp-float.js"></script>
  <script>
    document.getElementById("bizName").textContent = CONFIG.businessName;
    document.getElementById("bizTagline").textContent = CONFIG.tagline;
    document.getElementById("bizHeroPhrase").textContent = CONFIG.heroPhrase;

    // Transición al pedir cita: se muestra la escena de la barbería
    // a pantalla completa durante un momento antes de pasar a la agenda.
    document.getElementById("btnGoToIndex").addEventListener("click", (e) => {
      e.preventDefault();
      const href = e.currentTarget.getAttribute("href");
      const overlay = document.getElementById("cutTransition");
      overlay.classList.add("is-visible");
      setTimeout(() => { window.location.href = href; }, 2500);
    });
  </script>
</body>
</html>
